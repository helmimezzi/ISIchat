<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusMsg — Boîte de réception</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/variables.css">
  <link rel="stylesheet" href="/styles/layout.css">
</head>
<body>
<div class="app-shell">

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">✉</div>
      <span class="logo-text">CampusMsg</span>
    </div>

    <div class="sidebar-user">
      <div class="user-name" id="userName">—</div>
      <div class="user-id" id="userId">—</div>
      <div class="user-dept" id="userDept">—</div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-title">Messages</div>
      <a class="nav-item active" id="navInbox" href="#inbox">
        <span class="nav-icon">📥</span> Boîte de réception
        <span class="nav-badge" id="unreadBadge" style="display:none">0</span>
      </a>
      <a class="nav-item" id="navSent" href="#sent">
        <span class="nav-icon">📤</span> Messages envoyés
      </a>
      <a class="nav-item" href="/pages/compose.html">
        <span class="nav-icon">✏️</span> Nouveau message
      </a>
    </nav>

    <div class="sidebar-bottom">
      <a class="nav-item" id="btnLogout" href="#">
        <span class="nav-icon">🚪</span> Déconnexion
      </a>
    </div>
  </aside>

  <!-- ── Main Area ───────────────────────────────────────── -->
  <div class="main-area">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">Boîte de réception</div>
      <div class="topbar-actions">
        <a href="/pages/compose.html" class="btn-primary" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px;">
          ✏️ Nouveau
        </a>
      </div>
    </div>

    <div class="main-content" id="mainContent">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>
  </div>

</div>

<script src="/js/api.js"></script>
<script src="/js/inbox.js"></script>
</body>
</html>

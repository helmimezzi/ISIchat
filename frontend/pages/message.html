<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISIchat — Message</title>
  <link rel="stylesheet" href="/styles/variables.css">
  <link rel="stylesheet" href="/styles/layout.css">
  <style>
    .msg-detail { max-width: 720px; }
    .msg-header { margin-bottom: 22px; }
    .msg-header h2 {
      font-size: 22px; font-weight: 700;
      color: var(--text-primary); margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    .msg-meta-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 16px; font-size: 13px;
    }
    .msg-meta-grid .meta-label {
      font-weight: 700; color: var(--text-tertiary);
      text-transform: uppercase; font-size: 10px;
      letter-spacing: .08em;
      display: flex; align-items: center;
    }
    .msg-meta-grid .meta-value {
      color: var(--text-primary);
    }
    .msg-body-content {
      padding: 22px 0;
      border-top: 1px solid var(--border-dim);
      margin-top: 18px;
      font-size: 15px; line-height: 1.8;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg-actions {
      display: flex; gap: 12px;
      padding-top: 18px;
      border-top: 1px solid var(--border-dim);
      margin-top: 18px;
    }
  </style>
</head>
<body>
<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><img src="/assets/images/logo.png" alt="ISIchat"></div>
      <span class="logo-text">ISIchat</span>
    </div>

    <div class="sidebar-user">
      <div class="user-name" id="userName">—</div>
      <div class="user-id" id="userId">—</div>
      <div class="user-dept" id="userDept">—</div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-title">Messages</div>
      <a class="nav-item" href="/pages/inbox.html">
        <span class="nav-icon">📥</span> Boîte de réception
      </a>
      <a class="nav-item" href="/pages/inbox.html#sent">
        <span class="nav-icon">📤</span> Messages envoyés
      </a>
      <a class="nav-item" href="/pages/compose.html">
        <span class="nav-icon">✏️</span> Nouveau message
      </a>
    </nav>

    <div class="sidebar-bottom">
      <a class="nav-item" id="btnLogout" href="#">
        <span class="nav-icon">🚪</span> Déconnexion
      </a>
    </div>
  </aside>

  <div class="main-area">
    <div class="topbar">
      <div class="topbar-title">Détail du message</div>
      <div class="topbar-actions">
        <a href="/pages/inbox.html" class="btn-ghost" style="text-decoration:none;">← Retour</a>
      </div>
    </div>

    <div class="main-content" id="mainContent">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>
  </div>

</div>

<script src="/js/api.js"></script>
<script src="/js/message.js"></script>
</body>
</html>

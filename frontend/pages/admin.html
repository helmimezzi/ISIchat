<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusMsg — Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/variables.css">
  <link rel="stylesheet" href="/styles/layout.css">
</head>
<body>
<div class="app-shell">

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">✉</div>
      <span class="logo-text">CampusMsg</span>
    </div>

    <div class="sidebar-user">
      <div class="user-name" id="userName">—</div>
      <div class="user-id" id="userId">—</div>
      <div class="user-dept" style="color:var(--color-primary);font-weight:600;">🛡️ Administrateur</div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-title">Admin</div>
      <a class="nav-item active" id="navDashboard" href="#dashboard">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a class="nav-item" id="navAlerts" href="#alerts">
        <span class="nav-icon">🚨</span> Alertes
        <span class="nav-badge" id="alertsBadge" style="display:none">0</span>
      </a>
      <a class="nav-item" id="navSuspicious" href="#suspicious">
        <span class="nav-icon">🔍</span> IPs suspectes
      </a>
      <a class="nav-item" id="navStudents" href="#students">
        <span class="nav-icon">👥</span> Étudiants
      </a>

      <div class="nav-section-title" style="margin-top:12px;">Messages</div>
      <a class="nav-item" href="/pages/inbox.html">
        <span class="nav-icon">📥</span> Ma boîte
      </a>
    </nav>

    <div class="sidebar-bottom">
      <a class="nav-item" id="btnLogout" href="#">
        <span class="nav-icon">🚪</span> Déconnexion
      </a>
    </div>
  </aside>

  <!-- ── Main Area ───────────────────────────────────────── -->
  <div class="main-area">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">Dashboard Admin</div>
      <div class="topbar-actions">
        <button class="btn-ghost" id="btnRefresh">🔄 Actualiser</button>
      </div>
    </div>

    <div class="main-content" id="mainContent">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>
  </div>

</div>

<script src="/js/api.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>

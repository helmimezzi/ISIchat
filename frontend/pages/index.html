<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISIchat — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      background: #060a13;
      color: #edf0f7;
      overflow: hidden;
    }

    /* ── Left: Decorative Panel ─────────────────────────────── */
    .deco-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* Animated gradient mesh background */
    .deco-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 30% 40%, rgba(26,41,128,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 70% 70%, rgba(38,166,74,0.12) 0%, transparent 70%),
        radial-gradient(circle at 50% 10%, rgba(46,68,198,0.08) 0%, transparent 50%);
      animation: meshShift 20s ease-in-out infinite;
    }
    @keyframes meshShift {
      0%, 100% { transform: scale(1) rotate(0deg); }
      33% { transform: scale(1.05) rotate(1deg); }
      66% { transform: scale(0.98) rotate(-0.5deg); }
    }

    /* Grid pattern overlay */
    .deco-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .deco-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 40px;
    }
    .deco-icon {
      width: 250px; height: 250px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      position: relative;
    }
    .deco-icon img {
      width: 100%; height: 100%;
      object-fit: contain;
    }
    .deco-icon::after {
      display: none;
    }

    .deco-title {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(90deg, #1a2980, #26a64a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    .deco-subtitle {
      font-size: 16px;
      color: #505a74;
      font-weight: 400;
      max-width: 280px;
      margin: 0 auto;
      line-height: 1.5;
    }

    /* Floating geometric shapes */
    .geo-shape {
      position: absolute;
      border: 1px solid rgba(26,41,128,0.1);
      border-radius: 12px;
      pointer-events: none;
    }
    .geo-1 {
      width: 120px; height: 120px;
      top: 15%; left: 10%;
      transform: rotate(15deg);
      animation: geoFloat 12s ease-in-out infinite;
    }
    .geo-2 {
      width: 80px; height: 80px;
      bottom: 20%; right: 15%;
      border-color: rgba(38,166,74,0.1);
      transform: rotate(-20deg);
      animation: geoFloat 15s ease-in-out infinite reverse;
    }
    .geo-3 {
      width: 40px; height: 40px;
      top: 60%; left: 20%;
      border-radius: 50%;
      border-color: rgba(46,68,198,0.08);
      animation: geoFloat 10s ease-in-out infinite 2s;
    }
    @keyframes geoFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }

    /* ── Right: Login Panel ─────────────────────────────────── */
    .login-panel {
      width: 460px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: #0c1120;
      border-left: 1px solid rgba(255,255,255,0.04);
      position: relative;
    }
    /* Top gradient accent */
    .login-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #1a2980, #26a64a);
      opacity: 0.6;
    }

    .login-wrapper { width: 100%; max-width: 360px; }

    .login-header {
      margin-bottom: 36px;
    }
    .login-header h2 {
      font-size: 24px;
      font-weight: 700;
      color: #edf0f7;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .login-header p {
      font-size: 14px;
      color: #505a74;
    }

    .login-card {
      background: rgba(17,23,48,0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 32px;
      position: relative;
    }
    /* Gradient border overlay */
    .login-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(26,41,128,0.3), transparent 50%, rgba(38,166,74,0.15));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      -webkit-mask-composite: xor;
      pointer-events: none;
    }

    .field { margin-bottom: 22px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #505a74;
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      padding: 13px 16px;
      font-family: inherit;
      font-size: 14px;
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      color: #edf0f7;
      background: #111730;
      transition: all .25s cubic-bezier(0.22, 0.61, 0.36, 1);
      outline: none;
    }
    .field input::placeholder { color: #3e4758; }
    .field input:focus {
      border-color: rgba(46,68,198,0.5);
      box-shadow: 0 0 0 3px rgba(46,68,198,0.12), 0 0 20px rgba(26,41,128,0.15);
      background: #161d3a;
    }

    .btn {
      width: 100%;
      padding: 14px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      background: linear-gradient(135deg, #1a2980, #26a64a);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 6px;
      transition: all .3s cubic-bezier(0.22, 0.61, 0.36, 1);
      letter-spacing: 0.02em;
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent 60%);
      opacity: 0;
      transition: opacity .3s;
    }
    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(26,41,128,0.35), 0 4px 16px rgba(38,166,74,0.2);
    }
    .btn:hover:not(:disabled)::before { opacity: 1; }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: .35; cursor: not-allowed; }

    .error-msg {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(239,68,68,0.1);
      color: #ef4444;
      border-left: 3px solid #ef4444;
      border-radius: 10px;
      font-size: 13px;
    }

    .warn-msg {
      display: none;
      margin-top: 10px;
      font-size: 12px;
      color: #f59e0b;
    }

    .info {
      margin-top: 24px;
      padding: 14px 18px;
      background: rgba(26,41,128,0.06);
      border: 1px solid rgba(26,41,128,0.1);
      border-radius: 12px;
      font-size: 12px;
      color: #505a74;
      text-align: center;
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 900px) {
      body { flex-direction: column; }
      .deco-panel { display: none; }
      .login-panel {
        width: 100%;
        border-left: none;
        border-top: 1px solid rgba(255,255,255,0.04);
      }
    }
  </style>
</head>

<body>
  <!-- ── Left Decorative Panel ───────────────────────────── -->
  <div class="deco-panel">
    <div class="geo-shape geo-1"></div>
    <div class="geo-shape geo-2"></div>
    <div class="geo-shape geo-3"></div>
    <div class="deco-content">
      <div class="deco-icon"><img src="/assets/images/logo.png" alt="ISIchat"></div>
      <h1 class="deco-title">ISIchat</h1>
      <p class="deco-subtitle">Votre espace sécurisé de messagerie interne</p>
    </div>
  </div>

  <!-- ── Right Login Panel ───────────────────────────────── -->
  <div class="login-panel">
    <div class="login-wrapper">
      <div class="login-header">
        <h2>Connexion</h2>
        <p>Identifiez-vous pour accéder à votre messagerie</p>
      </div>

      <div class="login-card">
        <div class="field">
          <label for="studentId">Student ID</label>
          <input type="text" id="studentId" autocomplete="username" spellcheck="false" placeholder="Saisir votre ID">
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="Saisir votre mot de passe" autocomplete="current-password">
        </div>

        <button class="btn" id="loginBtn">Se connecter</button>
        <div class="warn-msg" id="attempts-left"></div>
        <div class="error-msg" id="error-msg"></div>

        <div class="info">🔒 Accès réservé aux membres enregistrés de l'ISI</div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusMsg — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e0ecff 0%, #f8fafc 60%);
    }
    .wrapper { width: 100%; max-width: 420px; padding: 24px; }

    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon {
      width: 52px; height: 52px;
      background: #1a56db;
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 26px; margin-bottom: 12px;
    }
    .logo h1 { font-size: 22px; font-weight: 700; color: #0f172a; }
    .logo p  { font-size: 13px; color: #64748b; margin-top: 4px; }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08), 0 0 0 1px #e2e8f0;
    }
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 12px; font-weight: 700;
      color: #64748b;
      text-transform: uppercase; letter-spacing: .05em;
      margin-bottom: 7px;
    }
    .field input {
      width: 100%; padding: 11px 14px;
      font-family: inherit; font-size: 14px;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      color: #0f172a; background: #fff;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    .field input:focus {
      border-color: #1a56db;
      box-shadow: 0 0 0 3px rgba(26,86,219,.12);
    }
    .btn {
      width: 100%; padding: 13px;
      font-family: inherit; font-size: 15px; font-weight: 600;
      background: #1a56db; color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      margin-top: 8px;
      transition: background .15s, transform .15s, box-shadow .15s;
    }
    .btn:hover:not(:disabled) {
      background: #1341a8;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(26,86,219,.3);
    }
    .btn:disabled { opacity: .6; cursor: not-allowed; }

    .error-msg {
      display: none; margin-top: 14px;
      padding: 11px 14px;
      background: #fef2f2; color: #dc2626;
      border-left: 3px solid #dc2626;
      border-radius: 8px; font-size: 13px;
    }
    .warn-msg {
      display: none; margin-top: 8px;
      font-size: 12px; color: #d97706;
    }
    .info {
      margin-top: 20px; padding: 10px 14px;
      background: #eff6ff; border-radius: 10px;
      font-size: 12px; color: #64748b; text-align: center;
    }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="logo">
    <div class="logo-icon">✉</div>
    <h1>CampusMsg</h1>
    <p>Messagerie interne du campus</p>
  </div>

  <div class="card">
    <div class="field">
      <label for="studentId">Student ID</label>
      <input type="text" id="studentId" placeholder="ex: 21CS042"
             autocomplete="username" spellcheck="false">
    </div>
    <div class="field">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••"
             autocomplete="current-password">
    </div>

    <button class="btn" id="loginBtn">Se connecter</button>
    <div class="warn-msg" id="attempts-left"></div>
    <div class="error-msg" id="error-msg"></div>

    <div class="info">🔒 Accès réservé aux membres enregistrés du campus</div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>

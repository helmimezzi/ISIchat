<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISIchat — Nouveau message</title>
  <link rel="stylesheet" href="/styles/variables.css">
  <link rel="stylesheet" href="/styles/layout.css">
  <style>
    .compose-form { max-width: 680px; }
    .compose-form .field { margin-bottom: 22px; }
    .compose-form .field label {
      display: block; font-size: 10px; font-weight: 700;
      color: var(--text-tertiary); text-transform: uppercase;
      letter-spacing: .1em; margin-bottom: 8px;
    }
    .compose-form textarea {
      min-height: 220px; resize: vertical; line-height: 1.6;
    }
    .compose-actions {
      display: flex; gap: 12px; margin-top: 12px;
    }
    .user-dropdown { position: relative; }
    .user-suggestions {
      position: absolute; top: 100%; left: 0; right: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: var(--r-md);
      max-height: 200px; overflow-y: auto;
      z-index: 100; display: none;
      box-shadow: var(--shadow-lg);
    }
    .user-suggestions.show { display: block; }
    .user-option {
      padding: 11px 16px; cursor: pointer;
      font-size: 13px; display: flex; justify-content: space-between;
      align-items: center; transition: all .15s var(--ease-out);
    }
    .user-option:hover { background: var(--bg-hover); }
    .user-option .opt-name { font-weight: 600; color: var(--text-primary); }
    .user-option .opt-info { font-size: 11px; color: var(--text-tertiary); }
    .selected-user {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, rgba(26,41,128,0.12), rgba(38,166,74,0.06));
      color: var(--text-link);
      padding: 7px 16px; border-radius: var(--r-pill);
      font-size: 13px; font-weight: 600; margin-top: 10px;
      border: 1px solid var(--border-brand);
    }
    .selected-user .remove-user {
      cursor: pointer; font-size: 16px; line-height: 1;
      color: var(--color-danger); margin-left: 4px;
      transition: transform .15s;
    }
    .selected-user .remove-user:hover { transform: scale(1.2); }
    .success-banner {
      display: none; padding: 16px 20px;
      background: var(--color-success-bg);
      border: 1px solid rgba(34,197,94,0.15);
      border-radius: var(--r-lg);
      color: var(--color-success); font-weight: 600;
      margin-bottom: 18px; font-size: 14px;
    }
  </style>
</head>
<body>
<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><img src="/assets/images/logo.png" alt="ISIchat"></div>
      <span class="logo-text">ISIchat</span>
    </div>

    <div class="sidebar-user">
      <div class="user-name" id="userName">—</div>
      <div class="user-id" id="userId">—</div>
      <div class="user-dept" id="userDept">—</div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-title">Messages</div>
      <a class="nav-item" href="/pages/inbox.html">
        <span class="nav-icon">📥</span> Boîte de réception
      </a>
      <a class="nav-item" href="#sent" onclick="window.location='/pages/inbox.html#sent'">
        <span class="nav-icon">📤</span> Messages envoyés
      </a>
      <a class="nav-item active" href="/pages/compose.html">
        <span class="nav-icon">✏️</span> Nouveau message
      </a>
    </nav>

    <div class="sidebar-bottom">
      <a class="nav-item" id="btnLogout" href="#">
        <span class="nav-icon">🚪</span> Déconnexion
      </a>
    </div>
  </aside>

  <div class="main-area">
    <div class="topbar">
      <div class="topbar-title">Nouveau message</div>
      <div class="topbar-actions">
        <a href="/pages/inbox.html" class="btn-ghost" style="text-decoration:none;">← Retour</a>
      </div>
    </div>

    <div class="main-content">
      <div class="success-banner" id="successBanner">✅ Message envoyé avec succès !</div>

      <div class="card compose-form" id="composeForm">
        <div class="field">
          <label for="recipientSearch">Destinataire</label>
          <div class="user-dropdown">
            <input type="text" id="recipientSearch" placeholder="Rechercher un étudiant..."
                   autocomplete="off" spellcheck="false">
            <div class="user-suggestions" id="userSuggestions"></div>
          </div>
          <div id="selectedRecipient"></div>
        </div>

        <div class="field">
          <label for="subject">Sujet</label>
          <input type="text" id="subject" placeholder="Objet du message" maxlength="200">
        </div>

        <div class="field">
          <label for="msgBody">Message</label>
          <textarea id="msgBody" placeholder="Écrivez votre message ici..." maxlength="5000"></textarea>
        </div>

        <div class="alert-box error" id="errorBox" style="display:none;margin-bottom:14px;"></div>

        <div class="compose-actions">
          <button class="btn-primary" id="btnSend">📨 Envoyer</button>
          <a href="/pages/inbox.html" class="btn-ghost" style="text-decoration:none;display:inline-flex;align-items:center;">Annuler</a>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="/js/api.js"></script>
<script src="/js/compose.js"></script>
</body>
</html>
